body{background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh}
.header{background:linear-gradient(135deg,#dc2626,#7c3aed);padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.header h1{font-size:28px;margin-bottom:6px}
.header p{opacity:.95;font-size:14px}
.header .date{display:inline-block;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;margin-top:10px;font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.card{background:#1e293b;padding:18px;border-radius:12px;border-left:4px solid #3b82f6;cursor:pointer;transition:.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(59,130,246,.3)}
.card .label{font-size:11px;text-transform:uppercase;opacity:.7;letter-spacing:1px}
.card .value{font-size:32px;font-weight:700;margin:6px 0}
.card .sub{font-size:12px;opacity:.8}
.card.danger{border-left-color:#ef4444}
.card.warn{border-left-color:#f59e0b}
.card.success{border-left-color:#10b981}
.card.info{border-left-color:#3b82f6}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:#1e293b;padding:20px;border-radius:12px}
.chart-box h3{margin-bottom:16px;font-size:15px}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:240px;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px}
.search-bar input:focus{outline:none;border-color:#7c3aed}
.filter-btn{padding:10px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;cursor:pointer;font-size:13px;transition:.2s}
.filter-btn:hover,.filter-btn.active{background:#7c3aed;border-color:#7c3aed}
.actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn-action{padding:12px 20px;border:none;border-radius:8px;color:white;cursor:pointer;font-weight:600;font-size:13px;transition:.2s}
.btn-wpp{background:#25D366}
.btn-wpp:hover{background:#1ea952}
.btn-print{background:#3b82f6}
.btn-print:hover{background:#2563eb}
.table-container{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8}
td{padding:12px 14px;border-top:1px solid #334155;font-size:13px}
tr{cursor:pointer;transition:.2s}
tr:hover td{background:#334155}
.badge{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:600;display:inline-block;white-space:nowrap}
.badge.pending{background:#7f1d1d;color:#fecaca}
.badge.progress{background:#78350f;color:#fde68a}
.badge.done{background:#064e3b;color:#a7f3d0}
.badge.blocked{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
.badge.urgent{background:#dc2626;color:white;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.detail-panel{background:#1e293b;padding:24px;border-radius:12px;display:none;margin-bottom:24px}
.detail-panel.open{display:block}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155}
.detail-header h2{font-size:22px}
.close-btn{background:#ef4444;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
.training-list{display:grid;gap:8px}
.training-item{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;padding:12px;background:#0f172a;border-radius:8px;align-items:center}
.training-item input[type=date],.training-item select{padding:6px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px}
.empty{text-align:center;padding:40px;opacity:.6}
.wpp-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:999;justify-content:center;align-items:center;padding:20px}
.wpp-modal.open{display:flex}
.wpp-content{background:#1e293b;border-radius:12px;padding:24px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto}
.wpp-content h3{margin-bottom:14px}
.wpp-text{background:#0f172a;padding:16px;border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:12px;max-height:50vh;overflow-y:auto;margin-bottom:14px}
.deadline{font-size:11px;font-weight:600;padding:2px 6px;border-radius:4px;display:inline-block}
.deadline.ok{background:#064e3b;color:#a7f3d0}
.deadline.urgent{background:#7f1d1d;color:#fecaca}
.deadline.expired{background:#450a0a;color:#fca5a5}
@media print{body{background:white;color:black}.search-bar,.actions,.filter-btn,.detail-panel,.wpp-modal{display:none!important}.card{background:#f1f5f9;color:black}td,th{color:black}}
@media(max-width:768px){.charts{grid-template-columns:1fr}.training-item{grid-template-columns:1fr}}
</style>
</head>

<div class="search-bar">

const state = {};
DRIVERS.forEach(d=>{state[d.id]={}; TRAININGS.forEach(t=>state[d.id][t]={status:"pending",dueDate:null})});
COMPLETED.forEach(([id,t])=>{if(state[id]&&state[id][t])state[id][t].status="done"});
PROGRESS.forEach(([id,t])=>{if(state[id]&&state[id][t]&&state[id][t].status!=="done")state[id][t].status="progress"});

// Atribui prazos
function addDays(date,days){const d=new Date(date); d.setDate(d.getDate()+days); return d.toISOString().split('T')[0]}
DRIVERS.forEach(d=>{
  TRAININGS.forEach(t=>{
    const v=state[d.id][t];
    if(v.status==="progress")v.dueDate=addDays(HOJE,PRAZO_PROGRESS);
    else if(v.status==="pending")v.dueDate=addDays(HOJE,PRAZO_PENDING);
  });
});

let currentFilter="pending-progress", searchTerm="";

function getDriverSummary(d){
  const s=state[d.id]; let done=0,progress=0,pending=0,blocked=0,urgent=false,nextDue=null;
  const today=HOJE.toISOString().split('T')[0];
  Object.values(s).forEach(v=>{
    if(v.status==="done")done++;
    else if(v.status==="progress"){progress++; if(v.dueDate<today)blocked++; else if(!nextDue||v.dueDate<nextDue)nextDue=v.dueDate; if(v.dueDate&&new Date(v.dueDate)-HOJE<=2*86400000)urgent=true}
    else{pending++; if(v.dueDate<today)blocked++; else if(!nextDue||v.dueDate<nextDue)nextDue=v.dueDate}
  });
  return {done,progress,pending,blocked,urgent,nextDue};
}

function render(){
  let totalDrivers=DRIVERS.length, withPending=0, withProgress=0, allDone=0, blocked=0, urgent=0;
  DRIVERS.forEach(d=>{
    const s=getDriverSummary(d);
    if(s.pending>0)withPending++;
    if(s.progress>0)withProgress++;
    if(s.done===TRAININGS.length)allDone++;
    if(s.blocked>0)blocked++;
    if(s.urgent)urgent++;
  });
  document.getElementById("metrics").innerHTML=`

function updateFilterButtons(){document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.filter===currentFilter))}

function renderTable(){
  const tb=document.getElementById("tbody");
  const today=HOJE.toISOString().split('T')[0];
  let rows=DRIVERS.filter(d=>{
    const q=searchTerm.toLowerCase();
    if(q&&!(d.nome.toLowerCase().includes(q)||d.placa.toLowerCase().includes(q)||d.id.includes(q)))return false;
    const s=getDriverSummary(d);
    if(currentFilter==="pending")return s.pending>0;
    if(currentFilter==="progress")return s.progress>0;
    if(currentFilter==="pending-progress")return s.pending>0||s.progress>0;
    if(currentFilter==="urgent")return s.urgent;
    if(currentFilter==="blocked")return s.blocked>0;
    if(currentFilter==="done")return s.done===TRAININGS.length;
    return true;
  });
  // Ordena por urgência
  rows.sort((a,b)=>{
    const sa=getDriverSummary(a),sb=getDriverSummary(b);
    if(sa.blocked!==sb.blocked)return sb.blocked-sa.blocked;
    if(sa.urgent!==sb.urgent)return sb.urgent-sa.urgent;
    return (sb.pending+sb.progress)-(sa.pending+sa.progress);
  });
  if(rows.length===0){tb.innerHTML=`<tr><td colspan="6" class="empty">Nenhum motorista encontrado</td></tr>`;return}

    const s=getDriverSummary(d);
    let statusBadge,deadlineCell="—";
    if(s.blocked>0)statusBadge=`<span class="badge blocked">🚫 Vencido (${s.blocked})</span>`;
    else if(s.urgent)statusBadge=`<span class="badge urgent">🔥 URGENTE</span>`;
    else if(s.done===TRAININGS.length)statusBadge=`<span class="badge done">✓ Completo</span>`;
    else if(s.progress>0)statusBadge=`<span class="badge progress">⏳ Em Andamento</span>`;

    if(s.nextDue){
      const days=Math.ceil((new Date(s.nextDue)-HOJE)/86400000);
      const cls=days<0?"expired":days<=2?"urgent":"ok";
      const txt=days<0?`Venceu há ${-days}d`:days===0?"VENCE HOJE":`em ${days} dia(s)`;
      deadlineCell=`<span class="deadline ${cls}">${formatDate(s.nextDue)} · ${txt}</span>`;
    }
    return `<tr onclick="openDetail('${d.id}')"><td><strong>${d.nome}</strong></td><td>${d.placa}</td><td>${s.pending}</td><td>${s.progress}</td><td>${deadlineCell}</td><td>${statusBadge}</td></tr>`;
  }).join("");
}

function formatDate(iso){if(!iso)return"—"; const[y,m,d]=iso.split('-'); return `${d}/${m}`}

window.openDetail=function(id){
  const d=DRIVERS.find(x=>x.id===id); const s=state[id];
  const panel=document.getElementById("detail");
  panel.classList.add("open");
  panel.innerHTML=`
    <div class="detail-header">
      <div><h2>${d.nome}</h2><p style="opacity:.7;margin-top:4px">Placa: ${d.placa} • ID: ${d.id}</p></div>
      <button class="close-btn" onclick="document.getElementById('detail').classList.remove('open')">Fechar ✕</button>
    </div>
    <div class="training-list">
      ${TRAININGS.map(t=>{
        const v=s[t]; const today=HOJE.toISOString().split('T')[0];
        const isBlocked=v.status!=="done"&&v.dueDate&&v.dueDate<today;
        let badge;
        if(isBlocked)badge=`<span class="badge blocked">🚫 Vencido</span>`;
        else if(v.status==="done")badge=`<span class="badge done">✓ Concluído</span>`;
        else if(v.status==="progress")badge=`<span class="badge progress">⏳ Em Andamento</span>`;
        else badge=`<span class="badge pending">📋 Pendente</span>`;
        return `<div class="training-item">
          <div><strong>${t}</strong></div>
          <div>${badge}</div>
          <select onchange="updateStatus('${id}','${t}',this.value)">
            <option value="pending"${v.status==="pending"?" selected":""}>Pendente</option>
            <option value="progress"${v.status==="progress"?" selected":""}>Em Andamento</option>
            <option value="done"${v.status==="done"?" selected":""}>Concluído</option>
          </select>
          <input type="date" value="${v.dueDate||''}" onchange="updateDue('${id}','${t}',this.value)" ${v.status==="done"?"disabled":""}>
        </div>`;
      }).join("")}
    </div>`;
  panel.scrollIntoView({behavior:"smooth"});
};
window.updateStatus=(id,t,v)=>{state[id][t].status=v; if(v==="done")state[id][t].dueDate=null; else if(!state[id][t].dueDate)state[id][t].dueDate=addDays(HOJE,v==="progress"?PRAZO_PROGRESS:PRAZO_PENDING); openDetail(id); render()};
window.updateDue=(id,t,v)=>{state[id][t].dueDate=v; render()};

// Geração de mensagem para WhatsApp
window.generateWhatsApp=function(){
  let msg=`🚨 *KANGU LM — TREINAMENTOS PENDENTES*\n📅 Atualizado: 04/05/2026\n📍 SSP36 Piracicaba\n\n`;
  const today=HOJE.toISOString().split('T')[0];
  const urgent=[],pending=[];
  DRIVERS.forEach(d=>{
    const s=state[d.id]; const items=[];
    TRAININGS.forEach(t=>{
      const v=s[t]; if(v.status==="done")return;
      const days=v.dueDate?Math.ceil((new Date(v.dueDate)-HOJE)/86400000):null;
      const icon=v.status==="progress"?"⏳":"📋";
      const prazo=days<0?`⚠️VENCIDO há ${-days}d`:days===0?"🔥HOJE":`${days}d`;
      items.push(`  ${icon} ${t} — ${prazo}`);
    });
    if(items.length){
      const block=`*${d.nome}* (${d.placa})\n${items.join('\n')}`;
      const sum=getDriverSummary(d);
      if(sum.urgent||sum.blocked)urgent.push(block); else pending.push(block);
    }
  });
  if(urgent.length){msg+=`🔥 *URGENTE — AÇÃO IMEDIATA*\n\n${urgent.join('\n\n')}\n\n`}
  if(pending.length){msg+=`📋 *PENDENTES*\n\n${pending.join('\n\n')}\n\n`}
  msg+=`\n_Concluir treinamentos no app Mercado Envios._`;
  document.getElementById("wppText").textContent=msg;
  document.getElementById("wppModal").classList.add("open");
};
window.copyWpp=function(){const t=document.getElementById("wppText").textContent; navigator.clipboard.writeText(t).then(()=>alert("✅ Mensagem copiada! Cole no WhatsApp."))};

let barChart, pieChart;
function renderCharts(){
  const labels=TRAININGS.map(t=>t.length>25?t.substring(0,23)+"…":t);
  const pendData=TRAININGS.map(t=>DRIVERS.filter(d=>state[d.id][t].status==="pending").length);
  const progData=TRAININGS.map(t=>DRIVERS.filter(d=>state[d.id][t].status==="progress").length);
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById("chartBar"),{type:"bar",data:{labels,datasets:[{label:"Pendente",data:pendData,backgroundColor:"#ef4444"},{label:"Em Andamento",data:progData,backgroundColor:"#f59e0b"}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{labels:{color:"#e2e8f0"}}},scales:{x:{stacked:true,ticks:{color:"#94a3b8"}},y:{stacked:true,ticks:{color:"#e2e8f0",font:{size:11}}}}}});

  const today=HOJE.toISOString().split('T')[0];
  let ok=0,urgent=0,expired=0;
  DRIVERS.forEach(d=>Object.values(state[d.id]).forEach(v=>{
    if(v.status==="done"||!v.dueDate)return;
    const days=Math.ceil((new Date(v.dueDate)-HOJE)/86400000);
    if(days<0)expired++; else if(days<=2)urgent++; else ok++;
  }));
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById("chartPie"),{type:"doughnut",data:{labels:["No prazo","Urgente (≤2d)","Vencido"],datasets:[{data:[ok,urgent,expired],backgroundColor:["#10b981","#f59e0b","#ef4444"]}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#e2e8f0"}}}}});
}

document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value; renderTable()});
document.querySelectorAll(".filter-btn").forEach(b=>b.onclick=()=>{currentFilter=b.dataset.filter; updateFilterButtons(); renderTable()});

render();
</script>

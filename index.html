<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kangu LM | Treinamentos Pendentes — Gestão à Vista</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh}
.header{background:linear-gradient(135deg,#dc2626,#7c3aed);padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.header h1{font-size:28px;margin-bottom:6px}
.header p{opacity:.95;font-size:14px}
.header .date{display:inline-block;background:rgba(255,255,255,.2);padding:6px 14px;border-radius:20px;margin-top:10px;font-weight:600}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.card{background:#1e293b;padding:20px;border-radius:12px;border-left:4px solid #ef4444;transition:.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(239,68,68,.3)}
.card .label{font-size:11px;text-transform:uppercase;opacity:.7;letter-spacing:1px}
.card .value{font-size:36px;font-weight:700;margin:8px 0}
.card .sub{font-size:12px;opacity:.8}
.card.warn{border-left-color:#f59e0b}
.card.info{border-left-color:#3b82f6}
.card.success{border-left-color:#10b981}
.charts{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:#1e293b;padding:20px;border-radius:12px}
.chart-box h3{margin-bottom:16px;font-size:15px}
.actions{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.btn-action{padding:12px 20px;border:none;border-radius:8px;color:white;cursor:pointer;font-weight:600;font-size:13px;transition:.2s}
.btn-wpp{background:#25D366}
.btn-wpp:hover{background:#1ea952}
.btn-print{background:#3b82f6}
.btn-print:hover{background:#2563eb}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:240px;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px}
.search-bar input:focus{outline:none;border-color:#7c3aed}
.table-container{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:14px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8}
td{padding:14px;border-top:1px solid #334155;font-size:14px}
tr:hover td{background:#334155}
.badge{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block;white-space:nowrap}
.badge.pending{background:#7f1d1d;color:#fecaca}
.deadline{font-size:12px;font-weight:600;padding:4px 10px;border-radius:6px;display:inline-block}
.deadline.ok{background:#064e3b;color:#a7f3d0}
.deadline.urgent{background:#78350f;color:#fde68a}
.deadline.expired{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
.placa-tag{background:#334155;padding:4px 10px;border-radius:6px;font-family:monospace;font-weight:600;font-size:13px}
.empty{text-align:center;padding:40px;opacity:.6}
.wpp-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:999;justify-content:center;align-items:center;padding:20px}
.wpp-modal.open{display:flex}
.wpp-content{background:#1e293b;border-radius:12px;padding:24px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto}
.wpp-content h3{margin-bottom:14px}
.wpp-text{background:#0f172a;padding:16px;border-radius:8px;white-space:pre-wrap;font-family:monospace;font-size:12px;max-height:50vh;overflow-y:auto;margin-bottom:14px}
.driver-section{background:#0f172a;border-radius:8px;padding:14px;margin-bottom:10px;border-left:3px solid #ef4444}
.driver-name{font-weight:700;font-size:15px;margin-bottom:8px;color:#fbbf24}
@media print{body{background:white;color:black}.actions,.search-bar,.wpp-modal{display:none!important}.card{background:#f1f5f9;color:black}td,th{color:black}.deadline.expired{background:#fee;color:#900}}
@media(max-width:768px){.charts{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>🚨 Kangu LM — Treinamentos Pendentes</h1>
  <p>SSP36 Piracicaba • Líder: Pamela • Last Mile • Gestão à Vista</p>
  <div class="date">📅 Hoje: 04/05/2026</div>
</div>

<div class="metrics" id="metrics"></div>

<div class="charts">
  <div class="chart-box"><h3>📊 Pendências por Treinamento</h3><canvas id="chartBar"></canvas></div>
  <div class="chart-box"><h3>👥 Pendências por Motorista</h3><canvas id="chartDrivers"></canvas></div>
</div>

<div class="actions">
  <button class="btn-action btn-wpp" onclick="generateWhatsApp()">📱 Gerar Mensagem WhatsApp</button>
  <button class="btn-action btn-print" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Buscar por placa, motorista ou treinamento...">
</div>

<div class="table-container">
  <table>
    <thead><tr><th>Motorista</th><th>Placa</th><th>Treinamento</th><th>Prazo Limite</th><th>Status</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="wpp-modal" id="wppModal">
  <div class="wpp-content">
    <h3>📱 Mensagem para o Grupo</h3>
    <div class="wpp-text" id="wppText"></div>
    <button class="btn-action btn-wpp" onclick="copyWpp()">📋 Copiar Mensagem</button>
    <button class="btn-action" style="background:#64748b" onclick="document.getElementById('wppModal').classList.remove('open')">Fechar</button>
  </div>
</div>

<script>
const HOJE = new Date('2026-05-04');
const PRAZO_DIAS = 7; // Prazo padrão para conclusão

// Mapa Placa → Nome do motorista
const NOMES = {
  "GAE4E73":"Alexandre Ramos Cruz",
  "SDD-EYX1C12":"Alan Gabriel Ribeiro",
  "SDD-GIK9H95":"João Gabriel Soares Franzim",
  "FII4E35":"Daniel de Souza Junior",
  "SDD-PUQ4A48":"Leidison Aparecido Rodrigues dos Santos",
  "SDD-EGD9H54":"Erica Balero Martine Peres",
  "SDD-DTB7D87":"Roberto de Jesus Mendes",
  "FLM5D14":"Vitor Hugo Montanari",
  "SDD-FCP2F19":"Rodrigo Aparecido de Carvalho Franca",
  "SDD-RMM6B87":"Hudson Aparecido Barbosa dos Reis",
  "SDD-FKK6E86":"Maxsandro Souza dos Santos",
  "SDD-GZL1A71":"Luis Augusto Sabatin"
};

// Base de PENDÊNCIAS (33 registros)
const PENDENCIAS = [
  {placa:"GAE4E73",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-EYX1C12",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-GIK9H95",treinamento:"Programa Pesados & Volumosos"},
  {placa:"FII4E35",treinamento:"Sacas Mestiças"},
  {placa:"SDD-PUQ4A48",treinamento:"Como evitar bloqueio - Loss Prevention"},
  {placa:"SDD-EGD9H54",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-DTB7D87",treinamento:"Motorista Seguro | Última milha"},
  {placa:"SDD-EGD9H54",treinamento:"Sacas Mestiças"},
  {placa:"FLM5D14",treinamento:"Como evitar bloqueio - Segurança"},
  {placa:"SDD-FCP2F19",treinamento:"Produtos Danificados - Última Milha"},
  {placa:"FLM5D14",treinamento:"Sacas Mestiças"},
  {placa:"FLM5D14",treinamento:"Produtos Danificados - Última Milha"},
  {placa:"SDD-GIK9H95",treinamento:"Sacas Mestiças"},
  {placa:"SDD-FCP2F19",treinamento:"Sacas Mestiças"},
  {placa:"SDD-EYX1C12",treinamento:"Sacas Mestiças"},
  {placa:"SDD-RMM6B87",treinamento:"Produtos Danificados - Última Milha"},
  {placa:"SDD-DTB7D87",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-RMM6B87",treinamento:"Motorista Seguro | Última milha"},
  {placa:"FII4E35",treinamento:"Programa Pesados & Volumosos"},
  {placa:"FLM5D14",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-FKK6E86",treinamento:"Programa Pesados & Volumosos"},
  {placa:"GAE4E73",treinamento:"Sacas Mestiças"},
  {placa:"SDD-DTB7D87",treinamento:"Sacas Mestiças"},
  {placa:"FLM5D14",treinamento:"Como evitar bloqueio - Compliance"},
  {placa:"SDD-RMM6B87",treinamento:"Programa Pesados & Volumosos"},
  {placa:"SDD-PUQ4A48",treinamento:"Como evitar bloqueio - Compliance"},
  {placa:"SDD-DTB7D87",treinamento:"Como evitar bloqueio - Compliance"},
  {placa:"SDD-DTB7D87",treinamento:"Como evitar bloqueio - Segurança"},
  {placa:"SDD-DTB7D87",treinamento:"Como evitar bloqueio - Loss Prevention"},
  {placa:"SDD-DTB7D87",treinamento:"Produtos Danificados - Última Milha"},
  {placa:"FLM5D14",treinamento:"Como evitar bloqueio - Loss Prevention"},
  {placa:"SDD-RMM6B87",treinamento:"Sacas Mestiças"},
  {placa:"SDD-GZL1A71",treinamento:"Programa Pesados & Volumosos"}
];

// Adiciona prazo a cada pendência
function addDays(date,days){const d=new Date(date); d.setDate(d.getDate()+days); return d.toISOString().split('T')[0]}
const PRAZO_LIMITE = addDays(HOJE, PRAZO_DIAS);
PENDENCIAS.forEach(p => {p.prazo = PRAZO_LIMITE; p.nome = NOMES[p.placa] || "— Identificar"});

let searchTerm = "";

function formatDate(iso){if(!iso)return"—"; const[y,m,d]=iso.split('-'); return `${d}/${m}/${y}`}
function diasRestantes(prazo){return Math.ceil((new Date(prazo)-HOJE)/86400000)}

function render(){
  // Métricas
  const totalPend = PENDENCIAS.length;
  const motoristasUnicos = [...new Set(PENDENCIAS.map(p=>p.placa))].length;
  const treinamentosUnicos = [...new Set(PENDENCIAS.map(p=>p.treinamento))].length;
  const dias = diasRestantes(PRAZO_LIMITE);
  
  document.getElementById("metrics").innerHTML = `
    <div class="card"><div class="label">📋 Total Pendências</div><div class="value">${totalPend}</div><div class="sub">Treinamentos a concluir</div></div>
    <div class="card warn"><div class="label">👥 Motoristas</div><div class="value">${motoristasUnicos}</div><div class="sub">Com pendências</div></div>
    <div class="card info"><div class="label">📚 Treinamentos</div><div class="value">${treinamentosUnicos}</div><div class="sub">Tipos diferentes</div></div>
    <div class="card success"><div class="label">⏰ Prazo Final</div><div class="value">${dias}d</div><div class="sub">Até ${formatDate(PRAZO_LIMITE)}</div></div>`;
  
  renderTable();
  renderCharts();
}

function renderTable(){
  const tb = document.getElementById("tbody");
  const q = searchTerm.toLowerCase();
  let rows = PENDENCIAS.filter(p => 
    !q || p.placa.toLowerCase().includes(q) || p.nome.toLowerCase().includes(q) || p.treinamento.toLowerCase().includes(q)
  );
  
  // Ordena por motorista (mais pendências primeiro)
  const counts = {};
  PENDENCIAS.forEach(p => counts[p.placa] = (counts[p.placa]||0)+1);
  rows.sort((a,b) => counts[b.placa]-counts[a.placa] || a.placa.localeCompare(b.placa));
  
  if(rows.length===0){tb.innerHTML=`<tr><td colspan="5" class="empty">Nenhuma pendência encontrada</td></tr>`; return}
  
  tb.innerHTML = rows.map(p => {
    const dias = diasRestantes(p.prazo);
    const cls = dias<0 ? "expired" : dias<=2 ? "urgent" : "ok";
    const txt = dias<0 ? `Vencido há ${-dias}d` : dias===0 ? "🔥 VENCE HOJE" : `${dias} dia(s)`;
    return `<tr>
      <td><strong>${p.nome}</strong></td>
      <td><span class="placa-tag">${p.placa}</span></td>
      <td>${p.treinamento}</td>
      <td><span class="deadline ${cls}">${formatDate(p.prazo)} · ${txt}</span></td>
      <td><span class="badge pending">⚠️ Pendente</span></td>
    </tr>`;
  }).join("");
}

window.generateWhatsApp = function(){
  const dias = diasRestantes(PRAZO_LIMITE);
  let msg = `🚨 *KANGU LM — TREINAMENTOS PENDENTES*\n📅 Atualizado: 04/05/2026\n📍 SSP36 Piracicaba\n⏰ Prazo final: ${formatDate(PRAZO_LIMITE)} (${dias} dias)\n\n`;
  
  // Agrupa por motorista
  const byDriver = {};
  PENDENCIAS.forEach(p => {
    if(!byDriver[p.placa]) byDriver[p.placa] = {nome: p.nome, items: []};
    byDriver[p.placa].items.push(p.treinamento);
  });
  
  // Ordena por quantidade
  const ordered = Object.entries(byDriver).sort((a,b) => b[1].items.length - a[1].items.length);
  
  ordered.forEach(([placa, info]) => {
    msg += `*${info.nome}* (${placa}) — ${info.items.length} pend.\n`;
    info.items.forEach(t => msg += `  📋 ${t}\n`);
    msg += `\n`;
  });
  
  msg += `_Concluir até ${formatDate(PRAZO_LIMITE)}._\n_Após o prazo: bloqueio de carregamento._`;
  
  document.getElementById("wppText").textContent = msg;
  document.getElementById("wppModal").classList.add("open");
};

window.copyWpp = function(){
  const t = document.getElementById("wppText").textContent;
  navigator.clipboard.writeText(t).then(()=>alert("✅ Mensagem copiada! Cole no WhatsApp."));
};

let barChart, driversChart;
function renderCharts(){
  // Gráfico por treinamento
  const byTraining = {};
  PENDENCIAS.forEach(p => byTraining[p.treinamento] = (byTraining[p.treinamento]||0)+1);
  const tLabels = Object.keys(byTraining).sort((a,b) => byTraining[b]-byTraining[a]);
  const tData = tLabels.map(l => byTraining[l]);
  
  if(barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("chartBar"), {
    type:"bar",
    data:{labels: tLabels.map(t=>t.length>25?t.substring(0,23)+"…":t), datasets:[{label:"Pendências", data:tData, backgroundColor:"#ef4444", borderRadius:6}]},
    options:{indexAxis:"y", responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:"#94a3b8",stepSize:1}}, y:{ticks:{color:"#e2e8f0",font:{size:11}}}}}
  });
  
  // Gráfico por motorista
  const byDriver = {};
  PENDENCIAS.forEach(p => byDriver[p.placa] = (byDriver[p.placa]||0)+1);
  const dEntries = Object.entries(byDriver).sort((a,b) => b[1]-a[1]);
  const dLabels = dEntries.map(([placa]) => `${NOMES[placa]?NOMES[placa].split(' ')[0]:placa} (${placa})`);
  const dData = dEntries.map(([,c]) => c);
  const dColors = dData.map(c => c>=5?"#dc2626" : c>=3?"#f59e0b" : "#3b82f6");
  
  if(driversChart) driversChart.destroy();
  driversChart = new Chart(document.getElementById("chartDrivers"), {
    type:"bar",
    data:{labels: dLabels, datasets:[{label:"Pendências", data:dData, backgroundColor:dColors, borderRadius:6}]},
    options:{indexAxis:"y", responsive:true, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:"#94a3b8",stepSize:1}}, y:{ticks:{color:"#e2e8f0",font:{size:11}}}}}
  });
}

document.getElementById("search").addEventListener("input", e => {searchTerm = e.target.value; renderTable()});

render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kangu LM — Controle de Treinamentos | Piracicaba SSP36</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,sans-serif}
body{background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh}
.header{background:linear-gradient(135deg,#1e40af,#7c3aed);padding:24px;border-radius:16px;margin-bottom:24px;box-shadow:0 10px 30px rgba(0,0,0,.3)}
.header h1{font-size:28px;margin-bottom:6px}
.header p{opacity:.9;font-size:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:24px}
.card{background:#1e293b;padding:20px;border-radius:12px;border-left:4px solid #3b82f6;cursor:pointer;transition:.3s}
.card:hover{transform:translateY(-4px);box-shadow:0 8px 20px rgba(59,130,246,.3)}
.card.active{background:#334155;border-left-color:#fbbf24}
.card .label{font-size:12px;text-transform:uppercase;opacity:.7;letter-spacing:1px}
.card .value{font-size:36px;font-weight:700;margin:8px 0}
.card .sub{font-size:13px;opacity:.8}
.card.pending{border-left-color:#ef4444}
.card.progress{border-left-color:#f59e0b}
.card.done{border-left-color:#10b981}
.charts{display:grid;grid-template-columns:2fr 1fr;gap:20px;margin-bottom:24px}
.chart-box{background:#1e293b;padding:20px;border-radius:12px}
.chart-box h3{margin-bottom:16px;font-size:16px}
.search-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:240px;padding:12px 16px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:14px}
.search-bar input:focus{outline:none;border-color:#3b82f6}
.filter-btn{padding:10px 18px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;cursor:pointer;font-size:13px;transition:.2s}
.filter-btn:hover,.filter-btn.active{background:#3b82f6;border-color:#3b82f6}
.table-container{background:#1e293b;border-radius:12px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
th{background:#0f172a;padding:14px;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:1px;color:#94a3b8}
td{padding:14px;border-top:1px solid #334155;font-size:14px}
tr{cursor:pointer;transition:.2s}
tr:hover td{background:#334155}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-block}
.badge.pending{background:#7f1d1d;color:#fecaca}
.badge.progress{background:#78350f;color:#fde68a}
.badge.done{background:#064e3b;color:#a7f3d0}
.badge.blocked{background:#450a0a;color:#fca5a5;border:1px solid #ef4444}
.detail-panel{background:#1e293b;padding:24px;border-radius:12px;display:none}
.detail-panel.open{display:block}
.detail-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155}
.detail-header h2{font-size:22px}
.detail-header .close{background:#ef4444;color:white;border:none;padding:8px 14px;border-radius:6px;cursor:pointer}
.training-list{display:grid;gap:10px}
.training-item{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:12px;padding:12px;background:#0f172a;border-radius:8px;align-items:center}
.training-item input[type=date]{padding:6px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0;font-size:12px}
.empty{text-align:center;padding:40px;opacity:.6}
@media(max-width:768px){.charts{grid-template-columns:1fr}.training-item{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <h1>🚚 Kangu LM — Controle de Treinamentos</h1>
  <p>SSP36 Piracicaba • Líder: Pamela • Atualização diária via Looker</p>
</div>

<div class="metrics" id="metrics"></div>

<div class="charts">
  <div class="chart-box"><h3>📊 % Conclusão por Treinamento</h3><canvas id="chartBar"></canvas></div>
  <div class="chart-box"><h3>📈 Distribuição Geral</h3><canvas id="chartPie"></canvas></div>
</div>

<div class="search-bar">
  <input type="text" id="search" placeholder="🔍 Buscar por nome, placa ou ID do motorista...">
  <button class="filter-btn active" data-filter="all">Todos</button>
  <button class="filter-btn" data-filter="pending">Pendente</button>
  <button class="filter-btn" data-filter="progress">Em Andamento</button>
  <button class="filter-btn" data-filter="done">Concluído</button>
  <button class="filter-btn" data-filter="blocked">Bloqueado</button>
</div>

<div class="table-container">
  <table>
    <thead><tr><th>Motorista</th><th>Placa</th><th>ID Driver</th><th>Pendentes</th><th>Em Andamento</th><th>Concluídos</th><th>Status</th></tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<div class="detail-panel" id="detail"></div>

<script>
// ===== BASE DE DADOS (46 motoristas ativos) =====
const TRAININGS = ["Motorista Seguro | Última milha","Como evitar bloqueio - Compliance","Produtos Danificados - Última Milha","Como evitar bloqueio - Loss Prevention","Como evitar bloqueio - Segurança","Sacas Mestiças","Programa Pesados & Volumosos"];

const DRIVERS = [
  {id:"2801206",nome:"Kleverson Soler Ribeiro",placa:"QMX1I79"},
  {id:"3674354",nome:"Erica Balero Martine Peres",placa:"EGD9H54"},
  {id:"3451462",nome:"Glacielson Ferreira de Amorim",placa:"QNG4G51"},
  {id:"4209278",nome:"Fabricio Oliveira Bernardes",placa:"FCQ2E16"},
  {id:"3333540",nome:"Daniel de Souza Junior",placa:"FII4E35"},
  {id:"1857248",nome:"Paulo Sergio Dos Santos",placa:"PZC6F68"},
  {id:"3926563",nome:"Eliton Ferreira da Conceicao",placa:"TJS2G24"},
  {id:"2994157",nome:"Joice Aparecida da Silva",placa:"FPI9H36"},
  {id:"3601154",nome:"Carlos Giovani de Almeida Justino da Silva",placa:"QUC9H26"},
  {id:"3998181",nome:"Mateus Batista Dos Santos",placa:"ETV8F90"},
  {id:"3746975",nome:"Helton Richard dos Santos",placa:"QNC8A81"},
  {id:"3351255",nome:"Luiz Henrique Dos Santos",placa:"UFJ3D00"},
  {id:"2238025",nome:"Jonas De Jesus Jorge",placa:"OYK8I04"},
  {id:"2570567",nome:"Aline Ingriti Rodrigues dos Santos",placa:"RGA4F91"},
  {id:"2820630",nome:"Jose Matheus de Araujo Ferreira",placa:"GBD6G99"},
  {id:"3422259",nome:"Gislaine Alencar",placa:"FRI1D03"},
  {id:"2228257",nome:"Hudson Aparecido Barbosa dos Reis",placa:"RMM6B87"},
  {id:"4160372",nome:"Alexandre Ramos Cruz",placa:"GAE4E73"},
  {id:"2934208",nome:"Tiago Pereira",placa:"FND3C89"},
  {id:"2783667",nome:"Luis Gustavo Moretti Siqueira",placa:"FHE3A92"},
  {id:"1898063",nome:"Lucca Cuenca",placa:"RTY1E35"},
  {id:"3609708",nome:"Rudson Moraes Toledo",placa:"ACX8D33"},
  {id:"3153983",nome:"Florisvaldo Amorim dos Santos",placa:"SUH2A35"},
  {id:"2881122",nome:"Jose Roberto da Silva",placa:"FTO8E02"},
  {id:"3736587",nome:"Emerson de Brito",placa:"GEC7H13"},
  {id:"1001",nome:"Rodrigo Aparecido de Carvalho Franca",placa:"FCP2F19"},
  {id:"1002",nome:"Katalyn Belanga",placa:"QUA6B77"},
  {id:"1003",nome:"Roberto de Jesus Mendes",placa:"DTB7D87"},
  {id:"1004",nome:"Vitor Hugo Montanari",placa:"FLM5D14"},
  {id:"1005",nome:"Weslley Gomes da Rocha",placa:"FPX0J68"},
  {id:"1006",nome:"Alan Gabriel Ribeiro",placa:"EYX1C12"},
  {id:"1007",nome:"Michel Catonio Dos Santos",placa:"LRP8H79"},
  {id:"1008",nome:"Luiz Carlos Teles",placa:"FTO8J00"},
  {id:"1009",nome:"Natalia SIlva Belanga",placa:"RNJ5D99"},
  {id:"1010",nome:"Sthefano Antonio Coan",placa:"GGM1H51"},
  {id:"1011",nome:"Thiago Grande de Aguiar",placa:"FEP9982"},
  {id:"1012",nome:"Marcos Pereira da Silva",placa:"STX7C93"},
  {id:"1013",nome:"Jurandir Madaleno Do Nascimento",placa:"EMY8972"},
  {id:"1014",nome:"Luis Augusto Sabatin",placa:"GZL1A71"},
  {id:"1015",nome:"Sebastiao da Silva Bueno Neto",placa:"FND6H18"},
  {id:"1016",nome:"Aline Fernanda Nogueira",placa:"UDL9I33"},
  {id:"1017",nome:"Adriano Silva Della Riva",placa:"CUU1E90"},
  {id:"1018",nome:"Genesis Ataide Campagnoli",placa:"GAQ1I47"},
  {id:"1019",nome:"Cassio Aparecido Pereira De Moraes",placa:"FTF1A81"},
  {id:"1020",nome:"Maxsandro Souza dos Santos",placa:"FKK6E86"},
  {id:"1021",nome:"Franco Hugo Rodrigues Modolo",placa:"NXY6C54"}
];

// Registros de treinamentos concluídos (extraídos da base)
const COMPLETED = [
  ["2801206","Motorista Seguro | Última milha"],["3674354","Como evitar bloqueio - Compliance"],
  ["3451462","Motorista Seguro | Última milha"],["4209278","Motorista Seguro | Última milha"],
  ["3333540","Produtos Danificados - Última Milha"],["1857248","Como evitar bloqueio - Compliance"],
  ["3926563","Como evitar bloqueio - Compliance"],["2994157","Programa Pesados & Volumosos"],
  ["3601154","Motorista Seguro | Última milha"],["3998181","Como evitar bloqueio - Compliance"],
  ["3746975","Motorista Seguro | Última milha"],["3351255","Como evitar bloqueio - Loss Prevention"],
  ["3926563","Como evitar bloqueio - Segurança"],["2238025","Sacas Mestiças"],
  ["2570567","Como evitar bloqueio - Loss Prevention"],["2820630","Produtos Danificados - Última Milha"],
  ["2994157","Produtos Danificados - Última Milha"],["2934208","Produtos Danificados - Última Milha"],
  ["2783667","Motorista Seguro | Última milha"],["1898063","Sacas Mestiças"],
  ["3609708","Como evitar bloqueio - Segurança"],["3153983","Como evitar bloqueio - Compliance"],
  ["2881122","Sacas Mestiças"],["3736587","Como evitar bloqueio - Compliance"],
  ["3422259","Motorista Seguro | Última milha"],["2228257","Motorista Seguro | Última milha"],
  ["4160372","Produtos Danificados - Última Milha"],["2994157","Como evitar bloqueio - Loss Prevention"],
  ["3998181","Como evitar bloqueio - Compliance"],["3609708","Como evitar bloqueio - Loss Prevention"],
  ["2783667","Sacas Mestiças"],["2801206","Como evitar bloqueio - Compliance"],
  ["3674354","Produtos Danificados - Última Milha"],["3451462","Sacas Mestiças"],
  ["4209278","Como evitar bloqueio - Segurança"]
];

// Estado: mapa driverId -> {training -> {status, dueDate}}
const state = {};
DRIVERS.forEach(d=>{state[d.id]={}; TRAININGS.forEach(t=>state[d.id][t]={status:"pending",dueDate:null})});
COMPLETED.forEach(([id,t])=>{if(state[id]&&state[id][t])state[id][t].status="done"});

// Simula "em andamento" para alguns (para demonstração inicial)
[["2801206","Sacas Mestiças"],["3674354","Motorista Seguro | Última milha"],["3926563","Produtos Danificados - Última Milha"],["2994157","Sacas Mestiças"]].forEach(([id,t])=>{if(state[id])state[id][t].status="progress"});

let currentFilter="all", searchTerm="", selectedDriver=null;

function getDriverSummary(d){
  const s=state[d.id]; let done=0,progress=0,pending=0,blocked=false;
  const today=new Date().toISOString().split('T')[0];
  Object.values(s).forEach(v=>{
    if(v.status==="done")done++;
    else if(v.status==="progress"){progress++; if(v.dueDate&&v.dueDate<today)blocked=true}
    else pending++;
  });
  return {done,progress,pending,blocked};
}

function render(){
  // Métricas
  let totalDrivers=DRIVERS.length, withPending=0, withProgress=0, allDone=0, blocked=0;
  DRIVERS.forEach(d=>{
    const s=getDriverSummary(d);
    if(s.pending>0)withPending++;
    if(s.progress>0)withProgress++;
    if(s.done===TRAININGS.length)allDone++;
    if(s.blocked)blocked++;
  });
  document.getElementById("metrics").innerHTML=`
    <div class="card" data-f="all"><div class="label">Total Motoristas</div><div class="value">${totalDrivers}</div><div class="sub">Ativos em SSP36</div></div>
    <div class="card pending" data-f="pending"><div class="label">Com Pendências</div><div class="value">${withPending}</div><div class="sub">${Math.round(withPending/totalDrivers*100)}% da base</div></div>
    <div class="card progress" data-f="progress"><div class="label">Em Andamento</div><div class="value">${withProgress}</div><div class="sub">Iniciado sem concluir</div></div>
    <div class="card done" data-f="done"><div class="label">100% Concluído</div><div class="value">${allDone}</div><div class="sub">Todos treinamentos OK</div></div>
    <div class="card" style="border-left-color:#ef4444" data-f="blocked"><div class="label">🚫 Bloqueados</div><div class="value">${blocked}</div><div class="sub">Prazo vencido</div></div>`;
  document.querySelectorAll(".card").forEach(c=>c.onclick=()=>{currentFilter=c.dataset.f; document.querySelectorAll(".filter-btn").forEach(b=>b.classList.toggle("active",b.dataset.filter===currentFilter)); renderTable()});

  renderTable();
  renderCharts();
}

function renderTable(){
  const tb=document.getElementById("tbody");
  const rows=DRIVERS.filter(d=>{
    const q=searchTerm.toLowerCase();
    const match=!q||d.nome.toLowerCase().includes(q)||d.placa.toLowerCase().includes(q)||d.id.includes(q);
    if(!match)return false;
    const s=getDriverSummary(d);
    if(currentFilter==="pending")return s.pending>0;
    if(currentFilter==="progress")return s.progress>0;
    if(currentFilter==="done")return s.done===TRAININGS.length;
    if(currentFilter==="blocked")return s.blocked;
    return true;
  });
  if(rows.length===0){tb.innerHTML=`<tr><td colspan="7" class="empty">Nenhum motorista encontrado</td></tr>`;return}
  tb.innerHTML=rows.map(d=>{
    const s=getDriverSummary(d);
    let statusBadge;
    if(s.blocked)statusBadge=`<span class="badge blocked">🚫 Bloqueado</span>`;
    else if(s.done===TRAININGS.length)statusBadge=`<span class="badge done">✓ Completo</span>`;
    else if(s.progress>0)statusBadge=`<span class="badge progress">⏳ Em Andamento</span>`;
    else statusBadge=`<span class="badge pending">⚠ Pendente</span>`;
    return `<tr onclick="openDetail('${d.id}')"><td><strong>${d.nome}</strong></td><td>${d.placa}</td><td>${d.id}</td><td>${s.pending}</td><td>${s.progress}</td><td>${s.done}/${TRAININGS.length}</td><td>${statusBadge}</td></tr>`;
  }).join("");
}

window.openDetail=function(id){
  selectedDriver=id;
  const d=DRIVERS.find(x=>x.id===id); const s=state[id];
  const panel=document.getElementById("detail");
  panel.classList.add("open");
  panel.innerHTML=`
    <div class="detail-header">
      <div><h2>${d.nome}</h2><p style="opacity:.7;margin-top:4px">Placa: ${d.placa} • ID: ${d.id}</p></div>
      <button class="close" onclick="document.getElementById('detail').classList.remove('open')">Fechar ✕</button>
    </div>
    <div class="training-list">
      ${TRAININGS.map(t=>{
        const v=s[t];
        const today=new Date().toISOString().split('T')[0];
        const isBlocked=v.status==="progress"&&v.dueDate&&v.dueDate<today;
        let badge;
        if(isBlocked)badge=`<span class="badge blocked">🚫 Vencido</span>`;
        else if(v.status==="done")badge=`<span class="badge done">✓ Concluído</span>`;
        else if(v.status==="progress")badge=`<span class="badge progress">⏳ Em Andamento</span>`;
        else badge=`<span class="badge pending">⚠ Pendente</span>`;
        return `<div class="training-item">
          <div><strong>${t}</strong></div>
          <div>${badge}</div>
          <select onchange="updateStatus('${id}','${t}',this.value)" style="padding:6px;background:#1e293b;border:1px solid #334155;border-radius:6px;color:#e2e8f0">
            <option value="pending"${v.status==="pending"?" selected":""}>Pendente</option>
            <option value="progress"${v.status==="progress"?" selected":""}>Em Andamento</option>
            <option value="done"${v.status==="done"?" selected":""}>Concluído</option>
          </select>
          <input type="date" value="${v.dueDate||''}" onchange="updateDue('${id}','${t}',this.value)" ${v.status!=="progress"?"disabled":""}>
        </div>`;
      }).join("")}
    </div>`;
  panel.scrollIntoView({behavior:"smooth"});
};
window.updateStatus=(id,t,v)=>{state[id][t].status=v; if(v!=="progress")state[id][t].dueDate=null; openDetail(id); render()};
window.updateDue=(id,t,v)=>{state[id][t].dueDate=v; render()};

let barChart, pieChart;
function renderCharts(){
  const labels=TRAININGS.map(t=>t.length>30?t.substring(0,28)+"…":t);
  const pct=TRAININGS.map(t=>{
    const done=DRIVERS.filter(d=>state[d.id][t].status==="done").length;
    return Math.round(done/DRIVERS.length*100);
  });
  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById("chartBar"),{type:"bar",data:{labels,datasets:[{label:"% Concluído",data:pct,backgroundColor:pct.map(p=>p>=80?"#10b981":p>=50?"#f59e0b":"#ef4444")}]},options:{indexAxis:"y",responsive:true,plugins:{legend:{display:false}},scales:{x:{max:100,ticks:{color:"#94a3b8"}},y:{ticks:{color:"#e2e8f0"}}}}});

  let done=0,prog=0,pend=0;
  DRIVERS.forEach(d=>Object.values(state[d.id]).forEach(v=>{if(v.status==="done")done++;else if(v.status==="progress")prog++;else pend++}));
  if(pieChart)pieChart.destroy();
  pieChart=new Chart(document.getElementById("chartPie"),{type:"doughnut",data:{labels:["Concluído","Em Andamento","Pendente"],datasets:[{data:[done,prog,pend],backgroundColor:["#10b981","#f59e0b","#ef4444"]}]},options:{responsive:true,plugins:{legend:{position:"bottom",labels:{color:"#e2e8f0"}}}}});
}

document.getElementById("search").addEventListener("input",e=>{searchTerm=e.target.value; renderTable()});
document.querySelectorAll(".filter-btn").forEach(b=>b.onclick=()=>{currentFilter=b.dataset.filter; document.querySelectorAll(".filter-btn").forEach(x=>x.classList.toggle("active",x===b)); renderTable()});

render();
</script>
</body>
</html>
